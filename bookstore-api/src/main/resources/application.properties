spring.application.name=hub-api

spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1IUzI1Ng==}
# WARNING: Set JWT_SECRET environment variable in production. The default above is for local development only.
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

# CORS restrict to specific origins in production (e.g. https://bookstore.com)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
