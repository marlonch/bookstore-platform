spring.application.name=hub-api

spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

app.jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:classpath:keys/private.pem}
app.jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
# WARNING: Mount production RSA keys via JWT_PRIVATE_KEY_PATH / JWT_PUBLIC_KEY_PATH. Never commit production keys.
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:24}

# CORS restrict to specific origins in production (e.g. https://bookstore.com)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[0].name=Bookstore API
springdoc.swagger-ui.urls[1].url=${ORDER_SERVICE_DOCS_URL:http://localhost:8081/v3/api-docs}
springdoc.swagger-ui.urls[1].name=Order Service
