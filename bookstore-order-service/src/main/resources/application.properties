spring.application.name=bookstore-order-service
server.port=${SERVER_PORT:8081}

spring.datasource.url=jdbc:mysql://localhost:3306/orders_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

bookstore.api.url=${BOOKSTORE_API_URL:http://localhost:8080}

spring.cloud.openfeign.client.config.bookstore-api.connect-timeout=3000
spring.cloud.openfeign.client.config.bookstore-api.read-timeout=5000

app.jwt.public-key-path=${JWT_PUBLIC_KEY_PATH:classpath:keys/public.pem}
# WARNING: Mount production RSA public key via JWT_PUBLIC_KEY_PATH. Never use dev keys in production.

# CORS: restrict to specific origins in production (e.g. https://bookstore.com)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[0].name=Order Service
springdoc.swagger-ui.urls[1].url=${CATALOG_API_DOCS_URL:http://localhost:8080/v3/api-docs}
springdoc.swagger-ui.urls[1].name=Bookstore API
